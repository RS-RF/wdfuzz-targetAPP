<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dept/list">部门管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/user/list">用户管理</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>用户管理</h2>
        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="searchKeyword" class="form-control" placeholder="搜索用户名或真实姓名...">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary" onclick="search()">搜索</button>
            </div>
        </div>
        <table class="table table-bordered" id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>真实姓名</th>
                    <th>部门</th>
                    <th>邮箱</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <!-- 动态加载数据 -->
            </tbody>
        </table>
    </div>
    <script>
        function loadUsers(url) {
            $.get(url, function(data) {
                var tbody = $('#userTable tbody');
                tbody.empty();
                data.forEach(function(user) {
                    tbody.append('<tr><td>' + user.userId + '</td><td>' + user.username + '</td><td>' + user.realName + '</td><td>' + (user.dept ? user.dept.deptName : '') + '</td><td>' + user.email + '</td><td>' + user.status + '</td></tr>');
                });
            }).fail(function(xhr) {
                alert('搜索出错：' + xhr.responseText);
            });
        }

        function search() {
            var keyword = $('#searchKeyword').val();
            loadUsers('/api/user/search?keyword=' + encodeURIComponent(keyword));
        }

        $(document).ready(function() {
            loadUsers('/api/user');
        });
    </script>
</body>
</html>
