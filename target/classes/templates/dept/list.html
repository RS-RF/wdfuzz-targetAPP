<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>部门管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dept/list">部门管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/user/list">用户管理</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>部门列表</h2>
        <table class="table table-bordered" id="deptTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>部门名称</th>
                    <th>状态</th>
                    <th>邮箱</th>
                    <th>更新时间</th>
                </tr>
            </thead>
            <tbody>
                <!-- 动态加载数据 -->
            </tbody>
        </table>
    </div>
    <script>
        $(document).ready(function() {
            $.get('/api/dept', function(data) {
                var tbody = $('#deptTable tbody');
                data.forEach(function(dept) {
                    tbody.append('<tr><td>' + dept.deptId + '</td><td>' + dept.deptName + '</td><td>' + dept.status + '</td><td>' + dept.email + '</td><td>' + dept.updateTime + '</td></tr>');
                });
            });
        });
    </script>
</body>
</html>
